name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for GitHub release
      id-token: write  # required for npm trusted publisher (OIDC)
    env:
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Set version
        run: |
          VER="1.0.${RUN_NUMBER}"
          npm version "$VER" --no-git-tag-version
          echo "VERSION=$VER" >> "$GITHUB_ENV"

      - name: Check if @sirrlock/mcp version already published
        id: mcp-check
        run: |
          if npm view "@sirrlock/mcp@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug OIDC environment
        run: |
          echo "npm: $(npm --version)"
          echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG}"
          echo "npmrc contents (redacted):"
          cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null | sed 's/_authToken=.*/[redacted]/' || echo "(no npmrc)"
          echo "OIDC URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "OIDC token set: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"

      - name: Publish @sirrlock/mcp
        if: steps.mcp-check.outputs.skip == 'false'
        run: |
          echo "registry=https://registry.npmjs.org/" > /tmp/clean.npmrc
          npm publish --access public --provenance --userconfig /tmp/clean.npmrc

      - name: Create GitHub release
        if: steps.mcp-check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
