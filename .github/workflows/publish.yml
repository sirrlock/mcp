name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for GitHub release
      id-token: write  # required for npm trusted publisher (OIDC)
    env:
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      # No registry-url here — setup-node writes an .npmrc expecting NODE_AUTH_TOKEN,
      # which conflicts with OIDC auth. OIDC needs a clean environment.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Set version
        run: |
          VER="1.0.${RUN_NUMBER}"
          npm version "$VER" --no-git-tag-version
          echo "VERSION=$VER" >> "$GITHUB_ENV"

      - name: Check if @sirrlock/mcp version already published
        id: mcp-check
        run: |
          if npm view "@sirrlock/mcp@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # npm detects ACTIONS_ID_TOKEN_REQUEST_TOKEN in the environment and exchanges
      # the GitHub OIDC token for a granular npm publish token automatically.
      # No NPM_TOKEN secret needed.
      #
      # One-time setup required on npmjs.com before first automated publish:
      #   @sirrlock/mcp → Settings → Publishing → Trusted Publishers
      #   Repository: sirrlock/mcp   Workflow: publish.yml   Environment: (none)
      - name: Publish @sirrlock/mcp
        if: steps.mcp-check.outputs.skip == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.mcp-check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
