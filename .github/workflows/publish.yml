name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for GitHub release
      id-token: write  # required for npm trusted publisher (OIDC)
    env:
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Set version
        run: |
          VER="1.0.${RUN_NUMBER}"
          npm version "$VER" --no-git-tag-version
          echo "VERSION=$VER" >> "$GITHUB_ENV"

      - name: Check if @sirrlock/mcp version already published
        id: mcp-check
        run: |
          if npm view "@sirrlock/mcp@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @sirrlock/mcp
        if: steps.mcp-check.outputs.skip == 'false'
        run: npm publish --access public --provenance

      - name: Create GitHub release
        if: steps.mcp-check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
